<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文文中</title>
    <style>
        :root {
            --bg-color: #ffffff;          /* 纯白背景 */
            --ink-green: #1a432b;         /* 墨绿色 主色调 */
            --ink-green-light: #2c6e46;   /* 浅墨绿 悬浮色 */
            --text-dark: #333333;         /* 深灰正文 */
            --text-gray: #777777;         /* 浅灰辅助文字 */
            --border-color: #d1d9d3;      /* 边框色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #fff;
        }

        h1 {
            color: var(--ink-green);
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* 搜索框区域 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--ink-green);
        }

        button {
            background-color: var(--ink-green);
            color: #fff;
            border: none;
            padding: 0 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: var(--ink-green-light);
        }

        /* 提示语 */
        .help-text {
            font-size: 13px;
            color: var(--text-gray);
            background: #f8faf9;
            padding: 15px;
            border-left: 4px solid var(--ink-green);
            border-radius: 4px;
            margin-bottom: 30px;
        }

        .help-text code {
            background: #e9ecea;
            color: var(--ink-green);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        /* 结果展示区 */
        #results {
            list-style: none;
        }

        .result-item {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .result-item:hover {
            background-color: #f4f7f5;
        }

        .ci {
            font-size: 20px;
            font-weight: bold;
            color: var(--ink-green);
        }

        .pinyin {
            font-size: 14px;
            color: var(--text-gray);
        }

        .status {
            text-align: center;
            color: var(--text-gray);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>中文文中</h1>
    <div class="subtitle">Chinese Nutri</div>

    <div class="help-text">
        <p><b>语法说明：</b></p>
        <p>1. <code>A</code> 代表任意汉字</p>
        <p>2. <code>[]</code> 代表从中任选一字</p>
        <p>3. <code>&lt;&gt;</code> 代表包含的字可以乱序</p>
        <p>示例：输入 <code>AA&lt;一二[三四五六]AA&gt;</code> 可以搜到 <b>不问三七二十一</b>。</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="请输入检索表达式，如 AA<一二[三四五六]AA>" autocomplete="off">
        <button onclick="performSearch()">检索</button>
    </div>

    <div id="statusMessage" class="status"></div>
    <ul id="results"></ul>
</div>

<script>

    let corpus = [];

    fetch('data/ci.json')
        .then(response => response.json())
        .then(data => { corpus = data; document.getElementById('statusMessage').innerText = `✅ 成功加载 ${corpus.length} 个条目`; })
        .catch(err => console.error("语料库加载失败", err));
  

    // --- 2. 核心算法：生成全排列 (代替 Python 的 itertools.permutations) ---
    function getPermutations(arr) {
        if (arr.length <= 1) return [arr];
        let result = [];
        for (let i = 0; i < arr.length; i++) {
            let current = arr[i];
            let remaining = arr.slice(0, i).concat(arr.slice(i + 1));
            let remainingPerms = getPermutations(remaining);
            for (let perm of remainingPerms) {
                result.push([current, ...perm]);
            }
        }
        return result;
    }

    // 正则转义，防止汉字或特殊符号破坏正则结构
    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // --- 3. 核心算法：解析自定义语法转化为正则 (翻译自 Python) ---
    function parsePattern(userInput) {
        let regexParts = [];
        let i = 0;
        let n = userInput.length;

        while (i < n) {
            let char = userInput[i];

            if (char === '[') {
                let j = userInput.indexOf(']', i);
                if (j === -1) throw new Error("语法错误: 未闭合的 '['");
                let content = userInput.substring(i + 1, j);
                regexParts.push(`[${escapeRegExp(content)}]`);
                i = j + 1;
            } 
            else if (char === '<') {
                let j = userInput.indexOf('>', i);
                if (j === -1) throw new Error("语法错误: 未闭合的 '<'");
                let content = userInput.substring(i + 1, j);
                
                let elements = [];
                for (let c of content) {
                    if (c === 'A') elements.push('.');
                    else elements.push(escapeRegExp(c));
                }
                
                // 获取全排列
                let perms = getPermutations(elements);
                // 拼接排列组合并去重
                let permStrings = Array.from(new Set(perms.map(p => p.join(''))));
                
                regexParts.push(`(?:${permStrings.join('|')})`);
                i = j + 1;
            } 
            else if (char === 'A') {
                regexParts.push('.');
                i++;
            } 
            else {
                regexParts.push(escapeRegExp(char));
                i++;
            }
        }
        return "^" + regexParts.join('') + "$";
    }

    // --- 4. 搜索交互与页面渲染 ---
    function performSearch() {
        const input = document.getElementById('searchInput').value.trim();
        const resultsContainer = document.getElementById('results');
        const statusMsg = document.getElementById('statusMessage');
        
        resultsContainer.innerHTML = ''; // 清空上次结果
        
        if (!input) {
            statusMsg.innerText = "请输入检索内容";
            return;
        }

        try {
            // 编译正则
            const regexStr = parsePattern(input);
            const regex = new RegExp(regexStr);
            
            // 过滤成语
            const matched = corpus.filter(item => regex.test(item.ci));
            
            if (matched.length > 0) {
                statusMsg.innerText = `为您找到 ${matched.length} 个结果：`;
                matched.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'result-item';
                    li.innerHTML = `
                        <span class="ci">${item.ci}</span>
                        <span class="pinyin">${item.pinyin || ''}</span>
                    `;
                    resultsContainer.appendChild(li);
                });
            } else {
                statusMsg.innerText = "没有找到符合条件的成语。";
            }
            
        } catch (error) {
            statusMsg.innerText = `❌ ${error.message}`;
            statusMsg.style.color = 'red';
        }
    }

    // 支持回车键直接搜索
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });
</script>

</body>
</html>
