<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文文中</title>
    <style>
        :root {
            --bg-color: #ffffff;          /* 纯白背景 */
            --ink-green: #1a432b;         /* 墨绿色 主色调 */
            --ink-green-light: #2c6e46;   /* 浅墨绿 悬浮色 */
            --text-dark: #333333;         /* 深灰正文 */
            --text-gray: #777777;         /* 浅灰辅助文字 */
            --border-color: #d1d9d3;      /* 边框色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: "PingFang SC", "Microsoft YaHei", serif;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: #fff;
        }

        h1 {
            color: var(--ink-green);
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 40px;
        }

        /* 提示语 */
        .help-text {
            font-size: 13px;
            color: var(--text-gray);
            background: #f8faf9;
            padding: 15px;
            border-left: 4px solid var(--ink-green);
            border-radius: 4px;
            margin-bottom: 30px;
        }

        .help-text code {
            background: #e9ecea;
            color: var(--ink-green);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        /* --- 语料库选择区域 --- */
        .corpus-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }

        .corpus-btn {
            padding: 6px 16px;
            font-size: 14px;
            color: var(--text-gray);
            background: #f8faf9;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .corpus-btn:hover {
            border-color: var(--ink-green-light);
            color: var(--ink-green-light);
        }

        .corpus-btn.active {
            background: var(--ink-green);
            color: #fff;
            border-color: var(--ink-green);
        }

        /* 搜索框区域 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--ink-green);
        }

        button {
            background-color: var(--ink-green);
            color: #fff;
            border: none;
            padding: 0 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        button:hover {
            background-color: var(--ink-green-light);
        }

        /* 继续搜索按钮特殊样式 */
        .continue-btn {
            display: none; /* 默认隐藏 */
            margin: 20px auto;
            background-color: #fff;
            color: var(--ink-green);
            border: 1px solid var(--ink-green);
            padding: 8px 24px;
        }

        .continue-btn:hover {
            background-color: #f4f7f5;
        }

        /* 结果展示区 */
        #results {
            list-style: none;
        }

        .result-item {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }

        .result-item:hover {
            background-color: #f4f7f5;
        }

        .word {
            font-size: 18px;
            font-weight: bold;
            color: var(--ink-green);
            flex-shrink: 0;      
            min-width: 80px;     
        }

        .explanation {
            font-size: 14px;
            color: var(--text-gray);
            flex: 1;             
            overflow: hidden;    
            text-overflow: ellipsis; 
            white-space: nowrap; 
            cursor: pointer;     
            line-height: 1.6;
            margin-top: 2px;
        }

        .explanation:hover {
            color: var(--ink-green-light);
        }

        .explanation.expanded {
            white-space: normal; 
        }

        .status {
            text-align: center;
            color: var(--text-gray);
            margin-top: 20px;
            font-size: 14px;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>中文文中</h1>
    <div class="subtitle">Chinese Nutri</div>

    <div class="help-text">
        <p><b>语法说明：</b></p>
        <p>1. <code>A</code> 代表任意1个汉字</p>
        <p>2. <code>A*</code> 代表任意多个汉字（可以为0个）</p>
        <p>3. <code>[]</code> 代表从中任选一字</p>
        <p>4. <code>&lt;&gt;</code> 代表包含的字可以乱序</p>
        <p>示例：输入 <code>A*&lt;A一般&gt;A*</code> 可搜出包含“一般”和任一其他汉字，且顺序打乱的任意长度词句。</p>
    </div>

    <!-- 语料库多选区域 -->
    <div class="corpus-selector" id="corpusSelector">
        <div class="corpus-btn active" data-url="data/word.json">标准</div>
        <div class="corpus-btn" data-url="data/idiom.json">常用成语</div>
        <div class="corpus-btn" data-url="data/proverb.json">时代语料</div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="请输入检索表达式，如 A*[上下左右]AA<A一般>" autocomplete="off">
        <button onclick="startSearch()">检索</button>
    </div>

    <div id="statusMessage" class="status">正在初始化...</div>
    <ul id="results"></ul>
    
    <!-- 防超时分段加载按钮 -->
    <button id="continueBtn" class="continue-btn" onclick="continueSearch()"> 继续搜索 (下个5秒) </button>
</div>

<script>
    // --- 1. 语料库管理系统 ---
    let corpusCache = {}; 
    let corpus = [];      

    async function updateCorpus() {
        const statusMsg = document.getElementById('statusMessage');
        statusMsg.innerText = "正在加载语料库...";
        
        const activeBtns = document.querySelectorAll('.corpus-btn.active');
        let combinedCorpus = [];

        for (let btn of activeBtns) {
            let url = btn.getAttribute('data-url');
            if (!corpusCache[url]) {
                try {
                    let response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    let data = await response.json();
                    corpusCache[url] = data; 
                } catch (err) {
                    console.warn("未找到文件，加载为空: " + url);
                    corpusCache[url] = []; 
                }
            }
            combinedCorpus = combinedCorpus.concat(corpusCache[url]);
        }
        
        corpus = combinedCorpus;
        statusMsg.innerText = `✅ 成功加载 ${corpus.length} 个条目`;
    }

    document.querySelectorAll('.corpus-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            this.classList.toggle('active');
            if (document.querySelectorAll('.corpus-btn.active').length === 0) {
                this.classList.add('active'); 
                return;
            }
            updateCorpus();
        });
    });

    updateCorpus();

    // --- 2. 核心算法：生成全排列 ---
    function getPermutations(arr) {
        if (arr.length <= 1) return [arr];
        let result = [];
        for (let i = 0; i < arr.length; i++) {
            let current = arr[i];
            let remaining = arr.slice(0, i).concat(arr.slice(i + 1));
            let remainingPerms = getPermutations(remaining);
            for (let perm of remainingPerms) {
                result.push([current, ...perm]);
            }
        }
        return result;
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // --- 3. 解析自定义语法转化为正则 (新增 A* 支持) ---
    function parsePattern(userInput) {
        let regexParts = [];
        let i = 0;
        let n = userInput.length;

        while (i < n) {
            let char = userInput[i];

            if (char === '[') {
                let j = userInput.indexOf(']', i);
                if (j === -1) throw new Error("语法错误: 未闭合的 '['");
                let content = userInput.substring(i + 1, j);
                regexParts.push(`[${escapeRegExp(content)}]`);
                i = j + 1;
            } 
            else if (char === '<') {
                let j = userInput.indexOf('>', i);
                if (j === -1) throw new Error("语法错误: 未闭合的 '<'");
                let content = userInput.substring(i + 1, j);
                
                let elements = [];
                let k = 0;
                // 解析 <> 内部的元素，支持 A*
                while (k < content.length) {
                    if (content[k] === 'A') {
                        if (k + 1 < content.length && content[k+1] === '*') {
                            elements.push('.*');
                            k += 2;
                        } else {
                            elements.push('.');
                            k++;
                        }
                    } 
                    else {
                        if (content[k] === '[') {
                            let endIdx = content.indexOf(']', k);
                            if (endIdx === -1) throw new Error("语法错误: 未闭合的 '[' 在 '<>' 内部");
                            elements.push(`[${escapeRegExp(content.substring(k + 1, endIdx))}]`);
                            k = endIdx + 1;
                        }
                        else{
                            elements.push(escapeRegExp(content[k]));
                            k++;
                        }
                        
                    }
                }
                
                let perms = getPermutations(elements);
                let permStrings = Array.from(new Set(perms.map(p => p.join(''))));
                
                regexParts.push(`(?:${permStrings.join('|')})`);
                i = j + 1;
            } 
            // 解析全局的 A 和 A*
            else if (char === 'A') {
                if (i + 1 < n && userInput[i+1] === '*') {
                    regexParts.push('.*');
                    i += 2;
                } else {
                    regexParts.push('.');
                    i++;
                }
            } 
            else {
                regexParts.push(escapeRegExp(char));
                i++;
            }
        }
        return "^" + regexParts.join('') + "$";
    }

    // --- 4. 具备超时保护的异步分段搜索系统 ---
    
    let searchState = {
        isActive: false,
        regex: null,
        index: 0,
        totalMatched: 0
    };

    function startSearch() {
        const input = document.getElementById('searchInput').value.trim();
        const resultsContainer = document.getElementById('results');
        const statusMsg = document.getElementById('statusMessage');
        const continueBtn = document.getElementById('continueBtn');
        
        resultsContainer.innerHTML = ''; 
        continueBtn.style.display = 'none';
        
        if (!input) {
            statusMsg.innerText = `✅ 当前总词库: ${corpus.length} 个条目`;
            return;
        }

        try {
            const regexStr = parsePattern(input);
            searchState.regex = new RegExp(regexStr);
            searchState.index = 0;
            searchState.totalMatched = 0;
            searchState.isActive = true;
            
            statusMsg.innerText = "🔍 引擎搜索中...";
            
            // 使用 setTimeout 让浏览器有时间渲染“搜索中”的文字，然后再进入繁重的正则运算
            setTimeout(processSearchChunk, 50);
            
        } catch (error) {
            statusMsg.innerText = `❌ ${error.message}`;
            statusMsg.style.color = 'red';
        }
    }

    function continueSearch() {
        const statusMsg = document.getElementById('statusMessage');
        const continueBtn = document.getElementById('continueBtn');
        statusMsg.innerText = "🔍 继续深度搜索中...";
        continueBtn.style.display = 'none';
        setTimeout(processSearchChunk, 50);
    }

    function processSearchChunk() {
        if (!searchState.isActive) return;

        const resultsContainer = document.getElementById('results');
        const statusMsg = document.getElementById('statusMessage');
        const continueBtn = document.getElementById('continueBtn');
        
        const startTime = Date.now();
        const TIME_LIMIT = 5000; // 限制最多允许运算 5 秒
        let localMatched = [];
        let itemsChecked = 0;

        // 执行核心搜索循环
        while (searchState.index < corpus.length) {
            const item = corpus[searchState.index];
            if (searchState.regex.test(item.word)) {
                localMatched.push(item);
            }
            searchState.index++;
            itemsChecked++;

            // 每校验 500 个词汇，看一下表，如果超过 5 秒立刻踩刹车跳出循环
            if (itemsChecked % 500 === 0) {
                if (Date.now() - startTime >= TIME_LIMIT) {
                    break;
                }
            }
        }

        searchState.totalMatched += localMatched.length;

        // 渲染这一批次找到的内容
        localMatched.forEach(item => {
            const li = document.createElement('li');
            li.className = 'result-item';
            
            const wordSpan = document.createElement('span');
            wordSpan.className = 'word';
            wordSpan.innerText = item.word;

            const expSpan = document.createElement('span');
            expSpan.className = 'explanation';
            expSpan.innerText = item.explanation || '暂无详细解释...';
            expSpan.title = "点击展开/收起完整解释";
            
            expSpan.addEventListener('click', function() {
                this.classList.toggle('expanded');
            });

            li.appendChild(wordSpan);
            li.appendChild(expSpan);
            resultsContainer.appendChild(li);
        });

        // 判断是搜索完毕，还是被超时打断的
        if (searchState.index < corpus.length) {
            let progress = Math.floor((searchState.index / corpus.length) * 100);
            statusMsg.innerText = `⏳ 搜索耗时过长已暂停 (当前进度 ${progress}%)，已找到 ${searchState.totalMatched} 个结果。点击下方按钮继续。`;
            statusMsg.style.color = "#d97706"; // 警告黄
            continueBtn.style.display = 'block';
        } else {
            statusMsg.innerText = `✅ 搜索完成，共为您找到 ${searchState.totalMatched} 个结果。`;
            statusMsg.style.color = "var(--text-gray)";
            continueBtn.style.display = 'none';
            searchState.isActive = false;
        }
    }

    // 支持回车键直接搜索
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            startSearch();
        }
    });
</script>

</body>
</html>
